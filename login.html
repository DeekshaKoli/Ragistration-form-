<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
</head>
<body>
    <style>
        body {
  margin: 0;
  padding: 0;
  font-family: Arial, sans-serif;

  /* 🌈 Gradient Background */
  background: linear-gradient(135deg, #667eea, #764ba2, #6dd5ed);
  height: 100vh;

  display: flex;
  justify-content: center;
  align-items: center;
}

/* 📦 Login Box */
.login-box {
  width: 300px;
  padding: 30px;

  text-align: center;
  border-radius: 15px;

  /* Glass effect */
  background: rgba(255, 255, 255, 0.15);
  backdrop-filter: blur(12px);

  color: white;

  /* Shadow */
  box-shadow: 0 8px 25px rgba(0,0,0,0.3);
}

/* 🔤 Heading */
.login-box h2 {
  margin-bottom: 20px;
}

/* ✏️ Inputs */
.login-box input {
  width: 100%;
  margin: 10px 0;
  padding: 10px;

  border: none;
  border-radius: 8px;
  outline: none;

  background: rgba(255,255,255,0.8);
}

/* 🔘 Button */
.login-box button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;

  background: linear-gradient(45deg, #ff7eb3, #ff758c);
  color: white;

  border: none;
  border-radius: 25px;
  font-weight: bold;

  cursor: pointer;
  transition: 0.3s;
}

/* Hover effect 🔥 */
.login-box button:hover {
  transform: scale(1.05);
  box-shadow: 0 5px 15px rgba(255, 118, 136, 0.5);
}
    </style>

<div class="login-box">
  <h2>Login</h2>

  <input type="text" id="user" placeholder="Username">
  <input type="email" id="email" placeholder="Email">

  <button onclick="login()">Login</button>
</div>

<script>
function login(){
  let user = document.getElementById("user").value
  let email = document.getElementById("email").value

  // 👉 allowed user (tum set karo)
  if(user === "Deeksha" && email === "deekshakoli52@gmail.com"){
    localStorage.setItem("auth", "true")
    window.location.href = "display.html"
  } else {
    alert("Access Denied ❌")
  }
}
</script>

</body>
</html>
